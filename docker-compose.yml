services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - ${MEDIA_PATH:-./media}:/media
    environment:
      - JELLYFIN_PublishedServerUrl=http://${SERVER_IP}:${JELLYFIN_PORT:-8096}

  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - WEBUI_PORT=8080
    ports:
      - "${QB_PORT:-8080}:8080"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - ./data/qbittorrent/config:/config
      - ${MEDIA_PATH:-./media}:/media

  telegram-bot:
    image: ghcr.io/tskon-kz/media-server-bot:latest
    container_name: telegram-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - QB_HOST=http://qbittorrent:8080
      - ALLOWED_USER=${ALLOWED_USER}
      - PROXY_URL=${PROXY_URL:-}
      - JELLYFIN_URL=http://jellyfin:8096
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - SERVER_IP=${SERVER_IP}
      - JELLYFIN_PORT=${JELLYFIN_PORT:-8096}
      - QB_PORT=${QB_PORT:-8080}
      - PYTHONUNBUFFERED=1
      - WATCHTOWER_TOKEN=${WATCHTOWER_TOKEN}
    volumes:
      - ./bot-data:/app/data
      - ${MEDIA_PATH:-./media}:/media
    depends_on:
      - qbittorrent
      - jellyfin
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN}
      - WATCHTOWER_LABEL_ENABLE=true
    command: --http-api-update --label-enable --interval 604800
