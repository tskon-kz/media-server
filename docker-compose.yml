services:
  jellyfin:
    # Pinned to a known-good version. Was :latest — an uncontrolled major upgrade
    # (10.x) once broke the stack on a routine update. Bump deliberately.
    image: jellyfin/jellyfin:10.11.11@sha256:aefb67e6a7ff1debdd154a78a7bbb780fd0c873d8639210a7f6a2016ad2b35db
    container_name: media-server-jellyfin
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - ${MEDIA_PATH:-./media}:/media
  qbittorrent:
    # qBittorrent 5.2.2 (hotio). Pinned by digest — qB 5.x renamed torrent states
    # (paused* -> stopped*), so an unplanned bump can break status/done detection.
    image: ghcr.io/hotio/qbittorrent@sha256:65dfa06797315b3d1e5b502c5f5a4c76a058441e94d6769fee18d57de27c08ef
    container_name: media-server-qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - WEBUI_PORTS=${QB_PORT:-8080}/tcp
    ports:
      - "${QB_PORT:-8080}:${QB_PORT:-8080}"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - ./data/qbittorrent/config:/config
      - ${MEDIA_PATH:-./media}:/media

  jackett:
    # Jackett v0.24.2184-ls453. Pinned by digest — bump deliberately.
    image: linuxserver/jackett@sha256:33fa8f6270913b5e649e2d01b20aae40c55a396eed38eb33dc5a797cb5f0cd6d
    container_name: media-server-jackett
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
    ports:
      - "${JACKETT_PORT:-9117}:9117"
    volumes:
      - ./data/jackett/config:/config

  telegram-bot:
    image: ghcr.io/tskon-kz/media-server-bot:${BOT_IMAGE_TAG:-stable}
    container_name: media-server-telegram-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ALLOWED_USER=${ALLOWED_USER}
      - QB_HOST=http://qbittorrent:${QB_PORT:-8080}
      - JELLYFIN_URL=http://jellyfin:8096
      - JELLYFIN_PORT=${JELLYFIN_PORT:-8096}
      - QB_PORT=${QB_PORT:-8080}
      - JACKETT_URL=${JACKETT_URL:-http://jackett:9117}
      - JACKETT_PORT=${JACKETT_PORT:-9117}
      - WATCHTOWER_TOKEN=${WATCHTOWER_TOKEN}
      - WEBAPP_URL=${WEBAPP_DOMAIN:+https://}${WEBAPP_DOMAIN}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./bot-data:/app/data
      - ${MEDIA_PATH:-./media}:/media
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/jackett/config:/jackett-config
    depends_on:
      - qbittorrent
      - jellyfin
      - jackett
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  upscaler:
    # Video upscaler worker: polls the shared SQLite queue and rewrites files in
    # place with a single ffmpeg pass. Both backends run on the GPU via libplacebo
    # (Vulkan) and need a /dev/dri device: `anime4k` runs the Anime4K neural
    # shaders (anime), `fsr` a high-quality anti-ring scaler (films). /dev/dri
    # covers AMD/Intel iGPUs; NVIDIA users add a runtime override in
    # docker-compose.override.yml. Built locally, not pulled.
    build:
      context: .
      dockerfile: upscaler/Dockerfile
    container_name: media-server-upscaler
    restart: unless-stopped
    volumes:
      - ./bot-data:/app/data                 # shared SQLite job queue
      - ${MEDIA_PATH:-./media}:/media        # same media paths as the other services
    devices:
      # Vulkan (AMD/Intel iGPU) — required: both backends are GPU-only now.
      - /dev/dri:/dev/dri
    depends_on:
      - telegram-bot

  cloudflared:
    # Pinned by digest — bump deliberately.
    image: cloudflare/cloudflared@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
    container_name: media-server-cloudflared
    restart: unless-stopped
    # Default quick tunnel. Profile derives from WEBAPP_DOMAIN: unset -> "" (on),
    # set -> "disabled" (off) — so a domain in .env alone switches this off.
    profiles: [ "${WEBAPP_DOMAIN:+disabled}" ]
    command: tunnel --no-autoupdate --protocol http2 --url http://telegram-bot:8081
    depends_on:
      - telegram-bot

  caddy:
    # Own-domain mode (no Cloudflare): auto-HTTPS reverse proxy to the bot. Runs
    # only when the `own-domain` profile is active (WEBAPP_DOMAIN set). Needs DNS
    # for WEBAPP_DOMAIN on this host and ports 80/443 open. Pinned by digest.
    image: caddy@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    container_name: media-server-caddy
    restart: unless-stopped
    profiles: [ "own-domain" ]
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    command: caddy reverse-proxy --from ${WEBAPP_DOMAIN:-} --to telegram-bot:8081
    volumes:
      - ./data/caddy:/data
    depends_on:
      - telegram-bot

  watchtower:
    # Pinned by digest — bump deliberately.
    image: containrrr/watchtower@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    container_name: media-server-watchtower
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WATCHTOWER_PORT:-9080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN}
      - WATCHTOWER_LABEL_ENABLE=true
      - DOCKER_API_VERSION=1.41
    command: --http-api-update --label-enable --interval 604800
