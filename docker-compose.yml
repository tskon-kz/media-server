services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: media-server-jellyfin
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - ${MEDIA_PATH:-./media}:/media
  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:latest
    container_name: media-server-qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - WEBUI_PORTS=${QB_PORT:-8080}/tcp
    ports:
      - "${QB_PORT:-8080}:${QB_PORT:-8080}"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - ./data/qbittorrent/config:/config
      - ${MEDIA_PATH:-./media}:/media

  jackett:
    image: linuxserver/jackett:latest
    container_name: media-server-jackett
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
    ports:
      - "${JACKETT_PORT:-9117}:9117"
    volumes:
      - ./data/jackett/config:/config

  telegram-bot:
    image: ghcr.io/tskon-kz/media-server-bot:latest
    container_name: media-server-telegram-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ALLOWED_USER=${ALLOWED_USER}
      - QB_HOST=http://qbittorrent:${QB_PORT:-8080}
      - JELLYFIN_URL=http://jellyfin:8096
      - JELLYFIN_PORT=${JELLYFIN_PORT:-8096}
      - QB_PORT=${QB_PORT:-8080}
      - JACKETT_URL=http://jackett:9117
      - JACKETT_PORT=${JACKETT_PORT:-9117}
      - WATCHTOWER_TOKEN=${WATCHTOWER_TOKEN}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./bot-data:/app/data
      - ${MEDIA_PATH:-./media}:/media
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - qbittorrent
      - jellyfin
      - jackett
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: media-server-watchtower
    restart: unless-stopped
    ports:
      - "127.0.0.1:9080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN}
      - WATCHTOWER_LABEL_ENABLE=true
      - DOCKER_API_VERSION=1.41
    command: --http-api-update --label-enable --interval 604800
