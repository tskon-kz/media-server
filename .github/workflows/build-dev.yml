name: Build Dev

on:
  push:
    branches: [dev]
    paths:
      - "bot/**"
      - "webapp/**"
      - "lang/**"
      - "pyproject.toml"
      - "docker-compose.yml"
      - ".github/workflows/build-dev.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./bot/Dockerfile
          push: true
          build-args: VERSION=dev-${{ steps.sha.outputs.short }}
          tags: ghcr.io/${{ github.repository_owner }}/media-server-bot:dev
