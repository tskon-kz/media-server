name: Build Release

# Triggered by publishing a GitHub Release (Releases → "Create a new release",
# tag like v1.5.0, target main). The git tag IS the version — pyproject.toml's
# version field is frozen and never read for update logic.
#
# Builds and pushes three tags to the same digest:
#   :vX.Y.Z  — immutable, for rollback to a specific version
#   :stable  — moving tag the normal update-check / "Update" button deploys
#   :latest  — permanent alias for :stable so existing installs (whose compose
#              still says :latest and whose Watchtower polls :latest) keep
#              receiving releases with zero manual migration.
#
# Does NOT deploy anywhere — deployment to prod stays a deliberate Telegram action.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v1.5.0)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: echo "name=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./bot/Dockerfile
          push: true
          build-args: VERSION=${{ steps.tag.outputs.name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/media-server-bot:${{ steps.tag.outputs.name }}
            ghcr.io/${{ github.repository_owner }}/media-server-bot:stable
            ghcr.io/${{ github.repository_owner }}/media-server-bot:latest
