name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - "bot/**"
      - "pyproject.toml"
      - "lang/**"
      - ".github/workflows/**"
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./bot/Dockerfile
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/media-server-bot:latest
            ghcr.io/${{ github.repository_owner }}/media-server-bot:${{ steps.version.outputs.version }}

      - name: Check if server is configured
        id: server_check
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          if [ -n "$HOST" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger update on server
        if: steps.server_check.outputs.configured == 'true'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            ENV_FILE=~/media-server/.env
            if [ ! -f "$ENV_FILE" ]; then
              echo "Server not set up yet, skipping update"
              exit 0
            fi
            TOKEN=$(grep ^WATCHTOWER_TOKEN "$ENV_FILE" | cut -d'=' -f2)
            if [ -z "$TOKEN" ]; then
              echo "WATCHTOWER_TOKEN not found in .env"
              exit 1
            fi
            curl -sf -X POST -H "Authorization: Bearer $TOKEN" http://localhost:8080/v1/update
